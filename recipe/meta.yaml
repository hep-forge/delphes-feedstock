{% set versions = {
    "3.5.0": "30a2536e0c8f47d633ecf3b4d51ec9924af54538e492470ad47b4ed34342f063"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'delphes')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://github.com/delphes/delphes/archive/refs/tags/{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}
  patches:
    # macOS build fix -- keep even though linux-only for now, cheap to carry
    - Delphes-ClosestPair2D-fwdDeclaration.patch
    # std::binary_function was removed in C++17; needed for modern compilers
    - remove_binary_function.patch

build:
  skip: true  # [win]
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    # hep-forge's own root/pythia builds -- NOT conda-forge's root_base, see
    # feedback-use-local-root-not-root-base memory
    - root
    - pythia

test:
  requires:
    - {{ compiler('cxx') }}
    - root
    - pythia
  commands:
    - test -f $PREFIX/bin/DelphesROOT
    - test -f $PREFIX/lib/libDelphes${SHLIB_EXT}

about:
  home: "https://github.com/delphes/delphes"
  license: "GPL-3.0-or-later"
  license_file: COPYING
  summary: "Delphes: fast multipurpose detector response simulation"
  description: |
    Delphes is a C++ framework for fast multipurpose detector response
    simulation, covering tracking, calorimetry, and a muon system, with
    output to standard formats (LHEF, HepMC).

extra:
  recipe-maintainers:
    - meiyasan
